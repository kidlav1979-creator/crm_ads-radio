<div class="card">
    <div class="card-header">
        <h2 id="formTitle"><i class="fas fa-plus-circle"></i> Регистрация ролика</h2>
        <button id="cancelEdit" class="btn-cancel" style="display:none;" onclick="window.resetDbForm()">Отмена</button>
    </div>
    
    <form id="dbAddTrackForm" class="db-form">
        <input type="hidden" id="db_id"> 
        <div class="db-form-row">
            <div class="form-group">
                <label>Код (PL-номер)</label>
                <input type="text" id="db_code" class="form-control" placeholder="PL-12345" maxlength="8">
            </div>
            <div class="form-group">
                <label>Название ролика #если нет в имени РУС или КАЗ - добавляем для удобства#*</label>
                <input type="text" id="db_title" class="form-control" required>
            </div>
        </div>
        <div class="db-form-row">
            <div class="form-group">
                <label>Язык</label>
                <select id="db_language" class="form-control">
                    <option value="русский">Русский</option>
                    <option value="казахский">Казахский</option>
                </select>
            </div>
            <div class="form-group">
                <label>Длительность (ЧЧ:ММ:СС) *</label>
                <input type="text" id="db_duration" class="form-control" required maxlength="8" placeholder="00:00:00">
            </div>
        </div>
        <button type="submit" class="btn-submit" id="dbSubmitBtn">Сохранить запись</button>
    </form>
</div>

<div class="card" style="margin-top: 20px;">
    <div class="card-header"><h3><i class="fas fa-history"></i> Последние 10 добавленных</h3></div>
    <table class="matrix-table">
        <thead>
            <tr>
                <th>Код</th>
                <th>Название</th>
                <th>Язык</th>
                <th>Длительность</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="dbTracksList"></tbody>
    </table>
</div>

<script>
(function() {
    // Маска времени
    document.getElementById('db_duration').addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 6) v = v.slice(0, 6);
        if (v.length >= 5) v = v.slice(0,2) + ':' + v.slice(2,4) + ':' + v.slice(4);
        else if (v.length >= 3) v = v.slice(0,2) + ':' + v.slice(2);
        e.target.value = v;
    });

    // Авто-регистр для кода
    document.getElementById('db_code').addEventListener('input', function(e) {
        this.value = this.value.toUpperCase();
    });

    // Загрузка списка роликов
    window.loadDatabaseTracks = async function() {
        const tbody = document.getElementById('dbTracksList');
        const res = await fetch('api/get_tracks.php?q=');
        let tracks = await res.json();
        
        const last10 = tracks.slice(0, 10);

        tbody.innerHTML = '';
        last10.forEach(t => {
            const tData = encodeURIComponent(JSON.stringify(t));
            tbody.innerHTML += `
                <tr>
                    <td><code>${t.code || '-'}</code></td>
                    <td style="text-align:left">${t.title}</td>
                    <td>${t.language}</td>
                    <td><b>${t.duration}</b></td>
                    <td>
                        <button class="action-btn edit" onclick="window.editTrack('${tData}')"><i class="fas fa-edit"></i></button>
                        <button class="action-btn del" onclick="window.deleteTrack(${t.id}, '${t.title.replace(/'/g, "\\'")}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
        });
    };

    window.editTrack = function(json) {
        const t = JSON.parse(decodeURIComponent(json));
        document.getElementById('db_id').value = t.id;
        document.getElementById('db_code').value = t.code || '';
        document.getElementById('db_title').value = t.title;
        document.getElementById('db_language').value = t.language;
        document.getElementById('db_duration').value = t.duration;
        
        document.getElementById('formTitle').innerText = "Редактирование ID: " + t.id;
        document.getElementById('dbSubmitBtn').innerText = "Обновить данные";
        document.getElementById('dbSubmitBtn').style.background = "#3498db";
        document.getElementById('cancelEdit').style.display = "inline-block";
        window.scrollTo(0,0);
    };

    window.resetDbForm = function() {
        document.getElementById('dbAddTrackForm').reset();
        document.getElementById('db_id').value = '';
        document.getElementById('formTitle').innerText = "Регистрация ролика";
        document.getElementById('dbSubmitBtn').innerText = "Сохранить запись";
        document.getElementById('dbSubmitBtn').style.background = "#27ae60";
        document.getElementById('cancelEdit').style.display = "none";
    };

    window.deleteTrack = async function(id, title) {
        const check = await fetch('api/manage_track.php', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({action: 'check', id: id})
        });
        const checkData = await check.json();

        if (checkData.count > 0) {
            alert(`Ошибка! Ролик "${title}" используется в эфире ${checkData.count} раз.`);
            return;
        }

        if (confirm(`Удалить ролик "${title}"?`)) {
            await fetch('api/manage_track.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'delete', id: id})
            });
            window.loadDatabaseTracks();
        }
    };

    document.getElementById('dbAddTrackForm').onsubmit = async function(e) {
        e.preventDefault();
        
        const codeValue = document.getElementById('db_code').value.trim();
        
        // Валидация кода на фронтенде
        if (codeValue !== "" && !/^PL-\d{5}$/.test(codeValue)) {
            alert("Ошибка: Код должен быть в формате PL-12345 (например, PL-00123)");
            return;
        }

        const id = document.getElementById('db_id').value;
        const url = id ? 'api/manage_track.php' : 'api/add_track.php';
        
        const payload = {
            id: id,
            action: 'update',
            code: codeValue,
            title: document.getElementById('db_title').value,
            language: document.getElementById('db_language').value,
            duration: document.getElementById('db_duration').value
        };

        const res = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const result = await res.json();
        
        if (result.status === 'success') {
            window.resetDbForm();
            window.loadDatabaseTracks();
        } else {
            alert(result.message);
        }
    };

    // Автоматическая загрузка данных при открытии модуля
    window.loadDatabaseTracks();
})();
</script>
