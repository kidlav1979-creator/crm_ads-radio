<div class="card">
    <div class="card-header d-flex-between">
        <h2 style="margin:0"><i class="fas fa-calendar-alt"></i> Планирование</h2>
        <div class="header-actions">
            <input type="month" id="schedMonth" class="form-control" style="width: auto;">
        </div>
    </div>

    <div class="scheduler-layout">
        <div class="scheduler-sidebar">
            <div class="form-group" style="position: relative;">
                <label>Поиск ролика</label>
                <input type="text" id="trackSearch" class="form-control" placeholder="Название или код..." autocomplete="off">
                <div id="searchResults" class="search-results-dropdown"></div>
                <input type="hidden" id="selectedTrackId">
            </div>

            <div id="selectedTrackInfo" class="info-box" style="display:none">
                <div class="info-label">Выбранный ролик:</div>
                <div id="currentTrackTitle" class="info-value"></div>
            </div>

            <div class="mini-grid">
                <div class="form-group">
                    <label>Блок</label>
                    <select id="sch_block" class="form-control">
                        <option value="1">Блок 1 (15-я)</option>
                        <option value="2">Блок 2 (45-я)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Язык</label>
                    <select id="sch_lang" class="form-control">
                        <option value="русский">Русский</option>
                        <option value="казахский">Казахский</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Голос</label>
                <select id="sch_vocal" class="form-control">
                    <option value="мужской">Мужской</option>
                    <option value="женский">Женский</option>
                </select>
            </div>

            <button onclick="saveSchedule()" class="btn btn-primary btn-block" style="margin-top:10px">
                <i class="fas fa-save"></i> Сохранить график
            </button>
        </div>

        <div class="scheduler-main">
            <div class="calendar-wrapper">
                <div class="calendar-controls">
                    <button class="btn-text" onclick="selectQuick('workdays')">Будни</button>
                    <button class="btn-text" onclick="selectQuick('weekends')">Выходные</button>
                    <button class="btn-text" style="color:#7f8c8d" onclick="clearSelection()">Сброс</button>
                </div>
                <div class="calendar-header-days">
                    <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div class="weekend">Сб</div><div class="weekend">Вс</div>
                </div>
                <div id="calendarGrid" class="calendar-grid"></div>
            </div>
        </div>
    </div>
</div>

<style>
    .scheduler-layout { display: flex; gap: 30px; padding: 20px; align-items: flex-start; }
    .scheduler-sidebar { flex: 0 0 300px; }
    .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    
    .calendar-wrapper { width: 340px; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; }
    .calendar-controls { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .calendar-header-days { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; font-size: 0.7rem; color: #95a5a6; margin-bottom: 5px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    
    .calendar-day { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: #f8f9fa; border-radius: 4px; font-size: 0.9rem; cursor: pointer; border: 1px solid transparent; }
    .calendar-day:hover { background: #eef2f7; border-color: #3498db; }
    .calendar-day.selected { background: #3498db !important; color: white; font-weight: bold; }
    .calendar-day.other-month { opacity: 0; pointer-events: none; }
    .weekend { color: #e74c3c; }

    .btn-text { background: none; border: none; font-size: 0.8rem; color: #3498db; cursor: pointer; padding: 0; }
    .info-box { background: #ebf5fb; padding: 8px 12px; border-radius: 4px; margin-bottom: 15px; border-left: 3px solid #3498db; }
    .info-value { font-weight: bold; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .search-results-dropdown { position: absolute; width: 100%; max-height: 200px; overflow-y: auto; background: white; border: 1px solid #ddd; z-index: 1000; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .search-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    .search-item:hover { background: #f8f9fa; }
</style>

<script>
(function() {
    let selectedDays = [];
    const monthInput = document.getElementById('schedMonth');
    const grid = document.getElementById('calendarGrid');

    // Установка текущего месяца по умолчанию
    if (!monthInput.value) {
        monthInput.value = new Date().toISOString().substring(0, 7);
    }

    window.renderCalendar = function() {
        grid.innerHTML = '';
        const [year, month] = monthInput.value.split('-').map(Number);
        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();
        
        // Корректировка для Пн-Вс (в JS 0 - это Вс)
        let offset = firstDay === 0 ? 6 : firstDay - 1;

        for (let i = 0; i < offset; i++) {
            const empty = document.createElement('div');
            empty.className = 'calendar-day other-month';
            grid.appendChild(empty);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const dayEl = document.createElement('div');
            dayEl.className = 'calendar-day';
            dayEl.textContent = d;
            
            const fullDate = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            if (selectedDays.includes(fullDate)) dayEl.classList.add('selected');

            dayEl.onclick = () => {
                if (selectedDays.includes(fullDate)) {
                    selectedDays = selectedDays.filter(day => day !== fullDate);
                } else {
                    selectedDays.push(fullDate);
                }
                renderCalendar();
            };
            grid.appendChild(dayEl);
        }
    };

    window.selectQuick = function(type) {
        const [year, month] = monthInput.value.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        selectedDays = [];

        for (let d = 1; d <= daysInMonth; d++) {
            const date = new Date(year, month - 1, d);
            const dayOfWeek = date.getDay(); // 0-Вс, 6-Сб
            const fullDate = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            
            if (type === 'workdays' && dayOfWeek !== 0 && dayOfWeek !== 6) selectedDays.push(fullDate);
            if (type === 'weekends' && (dayOfWeek === 0 || dayOfWeek === 6)) selectedDays.push(fullDate);
        }
        renderCalendar();
    };

    window.clearSelection = () => { selectedDays = []; renderCalendar(); };

    // Поиск ролика
    const searchInput = document.getElementById('trackSearch');
    const resultsDiv = document.getElementById('searchResults');

    searchInput.oninput = function() {
        const q = this.value;
        if (q.length < 2) { resultsDiv.style.display = 'none'; return; }
        
        fetch(`api/get_tracks.php?q=${encodeURIComponent(q)}`)
            .then(r => r.json())
            .then(data => {
                resultsDiv.innerHTML = '';
                data.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerHTML = `<small>${t.code}</small> <div>${t.title}</div>`;
                    div.onclick = () => {
                        document.getElementById('selectedTrackId').value = t.id;
                        document.getElementById('currentTrackTitle').textContent = t.title;
                        document.getElementById('selectedTrackInfo').style.display = 'block';
                        resultsDiv.style.display = 'none';
                        searchInput.value = t.title;
                    };
                    resultsDiv.appendChild(div);
                });
                resultsDiv.style.display = 'block';
            });
    };

    window.saveSchedule = async function() {
        const trackId = document.getElementById('selectedTrackId').value;
        if (!trackId || selectedDays.length === 0) {
            alert('Сначала выберите ролик и даты в календаре!');
            return;
        }

        const payload = {
            track_id: trackId,
            dates: selectedDays,
            block_num: document.getElementById('sch_block').value,
            language: document.getElementById('sch_lang').value,
            vocal: document.getElementById('sch_vocal').value
        };

        try {
            const res = await fetch('api/save_schedule.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if (result.status === 'success') {
                alert('Успешно сохранено!');
                selectedDays = [];
                renderCalendar();
            } else {
                alert('Ошибка: ' + result.message);
            }
        } catch (e) {
            alert('Ошибка сети или сервера');
        }
    };

    monthInput.onchange = renderCalendar;
    renderCalendar();
})();
</script>
